# Dataset de référence — Assistant service client
# Version : v1.0

# user_id utilisé par défaut pour toutes les questions.
# Peut être surchargé par question (champ user_id) ou via --user-id en ligne de commande.
user_id: 4

questions:

###############################################################################
##################          Requêtes de référence            ##################
###############################################################################

  - id: 1
    categorie: Conforme - liste
    question: "Quelles sont mes commandes ?"
    sql: |
      SELECT order_id, status, date_purchase
      FROM orders
      WHERE user_id = :user_id
      ORDER BY date_purchase DESC

  - id: 2
    categorie: Conforme - liste
    question: "Montre-moi toutes mes commandes."
    sql: |
      SELECT order_id, status, date_purchase, date_shipped, date_delivered
      FROM orders
      WHERE user_id = :user_id
      ORDER BY date_purchase DESC

  - id: 3
    categorie: Conforme - liste
    question: "Est-ce que j'ai des commandes ?"
    sql: |
      SELECT COUNT(*) AS total_commandes
      FROM orders
      WHERE user_id = :user_id

  - id: 4
    categorie: Conforme - liste
    question: "Combien de commandes ai-je passées au total ?"
    sql: |
      SELECT COUNT(*) AS total_commandes
      FROM orders
      WHERE user_id = :user_id

  - id: 5
    categorie: Conforme - liste
    question: "Affiche mes 5 dernières commandes."
    sql: |
      SELECT order_id, status, date_purchase
      FROM orders
      WHERE user_id = :user_id
      ORDER BY date_purchase DESC
      LIMIT 5

  - id: 6
    categorie: Conforme - liste
    question: "Quelle est ma commande la plus récente ?"
    sql: |
      SELECT order_id, status, date_purchase, date_shipped, date_delivered
      FROM orders
      WHERE user_id = :user_id
      ORDER BY date_purchase DESC
      LIMIT 1

  - id: 7
    categorie: Conforme - liste
    question: "Quelle est ma toute première commande ?"
    sql: |
      SELECT order_id, status, date_purchase
      FROM orders
      WHERE user_id = :user_id
      ORDER BY date_purchase ASC
      LIMIT 1

  - id: 8
    categorie: Conforme - liste
    question: "Montre-moi mes commandes passées cette année."
    sql: |
      SELECT order_id, status, date_purchase
      FROM orders
      WHERE user_id = :user_id
        AND strftime('%Y', date_purchase) = strftime('%Y', 'now')
      ORDER BY date_purchase DESC

  - id: 9
    categorie: Conforme - liste
    question: "Mes commandes du mois dernier."
    sql: |
      SELECT order_id, status, date_purchase
      FROM orders
      WHERE user_id = :user_id
        AND strftime('%Y-%m', date_purchase) = strftime('%Y-%m', 'now', '-1 month')
      ORDER BY date_purchase DESC

  - id: 10
    categorie: Conforme - liste
    question: "Montre-moi mes commandes passées en 2024."
    sql: |
      SELECT order_id, status, date_purchase
      FROM orders
      WHERE user_id = :user_id
        AND strftime('%Y', date_purchase) = '2024'
      ORDER BY date_purchase DESC

  # ── Statut des commandes ─────────────────────────────────────────────────────

  - id: 11
    categorie: Conforme - statut
    question: "Quel est le statut de ma commande 42 ?"
    sql: |
      SELECT order_id, status, date_purchase, date_shipped, date_delivered
      FROM orders
      WHERE user_id = :user_id
        AND order_id = 42

  - id: 12
    categorie: Conforme - statut
    question: "Ma commande 42 a-t-elle été expédiée ?"
    sql: |
      SELECT order_id, status, date_shipped
