  - id: 38
    categorie: Conforme - agregat
    question: "Quel est le délai moyen de livraison pour mes commandes ?"
    sql: |
      SELECT ROUND(AVG(julianday(date_delivered) - julianday(date_purchase)), 1) AS delai_moyen_jours
      FROM orders
      WHERE user_id = :user_id
        AND date_delivered IS NOT NULL

  - id: 39
    categorie: Conforme - agregat
    question: "Combien de commandes ai-je passées ce mois-ci ?"
    sql: |
      SELECT COUNT(*) AS commandes_ce_mois
