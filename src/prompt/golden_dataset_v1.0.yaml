      WHERE user_id = :user_id
        AND strftime('%Y-%m', date_purchase) = strftime('%Y-%m', 'now')

  - id: 40
    categorie: Conforme - agregat
    question: "Quelle commande a mis le plus longtemps à être livrée ?"
    sql: |
      SELECT order_id,
             CAST(julianday(date_delivered) - julianday(date_purchase) AS INTEGER) AS jours_livraison
      FROM orders
      WHERE user_id = :user_id
        AND date_delivered IS NOT NULL
