  # ── Questions spécifiques / jointure ────────────────────────────────────────

  - id: 43
    categorie: Conforme - specifique
    question: "Donne-moi tous les détails de ma commande 42."
    sql: |
      SELECT o.order_id, o.status, o.date_purchase, o.date_shipped, o.date_delivered,
             u.first_name, u.last_name, u.address, u.city, u.zip_code
      FROM orders o
      JOIN users u ON u.user_id = o.user_id
      WHERE o.user_id = :user_id
        AND o.order_id = 42

