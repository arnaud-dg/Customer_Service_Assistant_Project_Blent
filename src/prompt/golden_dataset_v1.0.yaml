  - id: 49
    categorie: Conforme - specifique
    question: "Quelles commandes ont été livrées ce mois-ci ?"
    sql: |
      SELECT order_id, date_delivered
      FROM orders
      WHERE user_id = :user_id
        AND status = 'delivered'
        AND strftime('%Y-%m', date_delivered) = strftime('%Y-%m', 'now')
      ORDER BY date_delivered DESC

  - id: 50
    categorie: Conforme - specifique
    question: "Quelles commandes ont été expédiées il y a plus de 10 jours et ne sont pas encore livrées ?"
    sql: |
      SELECT order_id, date_shipped,
             CAST(julianday('now') - julianday(date_shipped) AS INTEGER) AS jours_en_transit
      FROM orders
      WHERE user_id = :user_id
        AND status = 'shipped'
        AND julianday('now') - julianday(date_shipped) > 10
      ORDER BY date_shipped ASC

