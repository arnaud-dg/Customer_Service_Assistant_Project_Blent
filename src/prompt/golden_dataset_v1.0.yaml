  - id: 19
    categorie: Conforme - statut
    question: "Quelles sont mes commandes en cours ?"
    sql: |
      SELECT order_id, status, date_purchase
      FROM orders
      WHERE user_id = :user_id
        AND status IN ('invoiced', 'shipped')
      ORDER BY date_purchase DESC

  - id: 20
    categorie: Conforme - statut
    question: "Combien de commandes sont encore en cours ?"
    sql: |
      SELECT COUNT(*) AS commandes_en_cours
      FROM orders
      WHERE user_id = :user_id
        AND status IN ('invoiced', 'shipped')

  # ── Dates et délais ──────────────────────────────────────────────────────────

  - id: 21
    categorie: Conforme - dates
    question: "Quand ma commande 42 a-t-elle été expédiée ?"
    sql: |
      SELECT order_id, date_shipped
      FROM orders
      WHERE user_id = :user_id
        AND order_id = 42

  - id: 22
    categorie: Conforme - dates
    question: "Quand ma commande 42 a-t-elle été livrée ?"
    sql: |
      SELECT order_id, date_delivered
      FROM orders
      WHERE user_id = :user_id
        AND order_id = 42

  - id: 23
    categorie: Conforme - dates
    question: "Quand ai-je passé ma dernière commande ?"
    sql: |
      SELECT date_purchase
      FROM orders
      WHERE user_id = :user_id
      ORDER BY date_purchase DESC
      LIMIT 1

  - id: 24
    categorie: Conforme - dates
    question: "Combien de jours entre l'achat et la livraison de ma commande 42 ?"
    sql: |
      SELECT order_id,
             CAST(julianday(date_delivered) - julianday(date_purchase) AS INTEGER) AS jours_livraison
      FROM orders
      WHERE user_id = :user_id
        AND order_id = 42
        AND date_delivered IS NOT NULL

  - id: 25
    categorie: Conforme - dates
    question: "Quelle commande a été livrée le plus rapidement ?"
    sql: |
      SELECT order_id,
             CAST(julianday(date_delivered) - julianday(date_purchase) AS INTEGER) AS jours_livraison
      FROM orders
      WHERE user_id = :user_id
        AND date_delivered IS NOT NULL
      ORDER BY jours_livraison ASC
      LIMIT 1

  - id: 26
    categorie: Conforme - dates
    question: "Mes commandes passées après le 1er janvier 2024."
    sql: |
      SELECT order_id, status, date_purchase
      FROM orders
      WHERE user_id = :user_id
        AND date_purchase >= '2024-01-01'
      ORDER BY date_purchase ASC

  - id: 27
    categorie: Conforme - dates
    question: "Quand ai-je passé ma toute première commande ?"
    sql: |
      SELECT date_purchase
      FROM orders
      WHERE user_id = :user_id
      ORDER BY date_purchase ASC
      LIMIT 1

  - id: 28
    categorie: Conforme - dates
    question: "Quelles commandes ont été expédiées ce mois-ci ?"
    sql: |
      SELECT order_id, date_shipped
      FROM orders
      WHERE user_id = :user_id
        AND strftime('%Y-%m', date_shipped) = strftime('%Y-%m', 'now')
      ORDER BY date_shipped ASC

  - id: 29
    categorie: Conforme - dates
    question: "Quelles commandes ont été livrées en moins de 5 jours ?"
    sql: |
      SELECT order_id,
             CAST(julianday(date_delivered) - julianday(date_purchase) AS INTEGER) AS jours_livraison
      FROM orders
      WHERE user_id = :user_id
        AND date_delivered IS NOT NULL
        AND CAST(julianday(date_delivered) - julianday(date_purchase) AS INTEGER) < 5

  - id: 30
    categorie: Conforme - dates
    question: "Mes commandes livrées en 2024."
    sql: |
      SELECT order_id, date_delivered
      FROM orders
      WHERE user_id = :user_id
        AND status = 'delivered'
        AND strftime('%Y', date_delivered) = '2024'
      ORDER BY date_delivered DESC

