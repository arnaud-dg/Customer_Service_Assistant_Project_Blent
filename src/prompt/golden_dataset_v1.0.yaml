  # ── Questions ajoutées suite à l'analyse des formulations courantes ──────────

  - id: 61
    categorie: Conforme - statut
    question: "Où en est ma commande ?"
    sql: |
      SELECT order_id, status, date_purchase, date_shipped, date_delivered
      FROM orders
      WHERE user_id = :user_id
      ORDER BY date_purchase DESC

  - id: 62
    categorie: Conforme - dates
    question: "Quand sera-t-elle livrée ?"
    note: >
      Question anaphorique : « elle » réfère à la commande mentionnée dans le tour précédent.
      Teste la mémoire court-terme (MemorySaver). La requête cible la commande en cours la plus récente
      faute de contexte explicite.
    sql: |
      SELECT order_id, status, date_shipped, date_delivered
      FROM orders
      WHERE user_id = :user_id
        AND status != 'delivered'
      ORDER BY date_purchase DESC
      LIMIT 1

  - id: 63
    categorie: Conforme - non-supporté
    question: "Puis-je modifier ou annuler ma commande ?"
    note: >
      Action d'écriture hors périmètre : le système est read-only.
      L'intent classifier classe « commande » (correct), mais le nœud SQL doit retourner
      SELECT 1 WHERE 0 et le formateur doit expliquer poliment que la modification n'est pas possible.
    sql: |
      SELECT 1 WHERE 0
    comportement_attendu: refus_poli

  - id: 64
    categorie: Conforme - statut
    question: "Quel est l'état du paiement ?"
    sql: |
      SELECT order_id, status
      FROM orders
      WHERE user_id = :user_id
      ORDER BY date_purchase DESC
